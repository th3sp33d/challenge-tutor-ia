services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: challenge_n8n
    env_file: .env
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${MY_NGROK_URL}
      - GENERIC_TIMEZONE=America/Santiago
      - TZ=America/Santiago
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
    volumes:
      - n8n_storage:/home/node/.n8n
      - ../backend-n8n/documentos:/files
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: challenge_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  n8n_storage:
  qdrant_storage:
